# Project-local Codex defaults for MOP Flow.

project_doc_fallback_filenames = ["AGENTS.md", "GEMINI.md", "CLAUDE.md"]
project_doc_max_bytes = 65536

[mcp_servers."mop-flow"]
enabled = true
command = "node"
args = [".MOP/scripts/mop-flow.mjs", "mcp", "start"]
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers."mop-flow".env]
npm_config_update_notifier = "false"
MOP_FLOW_BRAND = "MOP Flow"
MOP_FLOW_CANONICAL = "true"
MOP_FLOW_PROVIDER_PARITY = "true"
