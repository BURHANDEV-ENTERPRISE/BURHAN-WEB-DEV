<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MOP Pixel Office</title>
<meta name="description" content="MOP Flow — Pixel Office Dashboard. Pantau semua agent, fasa workflow, dan aktiviti projek secara real-time.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap');

  :root {
    --bg: #0d0d1a;
    --surface: #12122a;
    --surface2: #1a1a35;
    --accent: #e94560;
    --accent2: #7c3aed;
    --text: #eaeaea;
    --muted: #6272a4;
    --green: #50fa7b;
    --amber: #f1fa8c;
    --purple: #bd93f9;
    --cyan: #8be9fd;
    --pink: #ff79c6;
    --border: #2d2d5e;
    --pixel: 'Press Start 2P', 'Courier New', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scanline effect ── */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(233,69,96,0.2);
  }

  .logo {
    font-family: var(--pixel);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    text-shadow: 0 0 10px var(--accent);
    white-space: nowrap;
  }

  .phase-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    padding: 4px 10px;
    font-family: var(--pixel);
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { box-shadow: 0 0 5px var(--accent); }
    to   { box-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent2); }
  }

  .stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
  }

  .stat {
    text-align: center;
    min-width: 50px;
  }

  .stat-num {
    font-family: var(--pixel);
    font-size: 14px;
    font-weight: bold;
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .refresh-time {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Main Content ── */
  .main {
    padding: 16px 20px;
    margin-bottom: 80px;
  }

  .section-title {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Agent Grid ── */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  /* ── Agent Card ── */
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 10px;
    position: relative;
    cursor: pointer;
    transition: all 0.2s ease;
    overflow: hidden;
  }

  .agent-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 2px;
    background: var(--border);
    transition: background 0.2s;
  }

  .agent-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(233,69,96,0.2);
  }

  .agent-card:hover::before { background: var(--accent); }

  .agent-card.typing { border-color: var(--green); }
  .agent-card.typing::before { background: var(--green); }
  .agent-card.thinking { border-color: var(--purple); }
  .agent-card.thinking::before { background: var(--purple); }
  .agent-card.done { border-color: var(--amber); }
  .agent-card.done::before { background: var(--amber); }

  /* Pixel sprite area */
  .pixel-char {
    width: 40px;
    height: 40px;
    margin: 0 auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    image-rendering: pixelated;
    transition: transform 0.3s ease;
  }

  .agent-card:hover .pixel-char { transform: scale(1.15); }
  .agent-card.typing .pixel-char { animation: bounce 0.5s ease infinite alternate; }
  .agent-card.thinking .pixel-char { animation: sway 2s ease-in-out infinite; }
  .agent-card.done .pixel-char { animation: celebrate 0.8s ease-in-out; }

  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-4px); }
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50%       { transform: rotate(5deg); }
  }

  @keyframes celebrate {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1); }
  }

  .agent-name {
    font-family: var(--pixel);
    font-size: 7px;
    font-weight: bold;
    text-align: center;
    color: var(--text);
    margin-bottom: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .agent-title {
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Status dot */
  .status-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    flex-shrink: 0;
    border-radius: 0; /* pixel square dot */
  }

  .dot-idle     { background: var(--muted); }
  .dot-typing   { background: var(--green); animation: blink 0.8s step-end infinite; }
  .dot-thinking { background: var(--purple); animation: blink 1.5s step-end infinite; }
  .dot-done     { background: var(--amber); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  .agent-activity {
    font-size: 9px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tier-badge {
    position: absolute;
    top: 5px;
    right: 6px;
    font-family: var(--pixel);
    font-size: 6px;
    color: var(--border);
  }

  /* Speech bubble on hover */
  .bubble {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--green);
    padding: 4px 8px;
    font-size: 9px;
    white-space: nowrap;
    display: none;
    z-index: 20;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--cyan);
  }

  .bubble::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--green);
  }

  .agent-card:hover .bubble { display: block; }

  /* ── Workflow Bar ── */
  .workflow-bar {
    background: var(--surface);
    border-top: 2px solid var(--border);
    padding: 10px 20px;
    position: fixed;
    bottom: 0;
    width: 100%;
    z-index: 100;
  }

  .workflow-label {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .phases {
    display: flex;
    gap: 3px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .phases::-webkit-scrollbar { display: none; }

  .phase {
    padding: 4px 8px;
    font-family: var(--pixel);
    font-size: 7px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    white-space: nowrap;
    cursor: default;
    transition: all 0.2s;
  }

  .phase.current {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 10px rgba(233,69,96,0.4);
  }

  .phase.completed {
    border-color: var(--green);
    color: var(--green);
  }

  .phase.pending { color: var(--border); }

  /* ── No Agents State ── */
  .no-agents {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }

  .no-agents .icon { font-size: 48px; margin-bottom: 12px; }
  .no-agents p { font-size: 12px; line-height: 1.6; }

  /* ── Profile Info ── */
  .profile-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .profile-label {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--purple);
  }

  .profile-name {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--cyan);
    text-transform: uppercase;
  }

  .fed-badge {
    margin-left: auto;
    font-size: 9px;
    color: var(--muted);
  }

  .fed-badge.active { color: var(--green); }

  /* ── Error state ── */
  .error-box {
    background: rgba(233,69,96,0.1);
    border: 1px solid var(--accent);
    padding: 16px;
    color: var(--accent);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">⬛ MOP PIXEL OFFICE</span>
  <span class="phase-badge" id="current-phase">...</span>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-agents">0</div>
      <div class="stat-label">Agents</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-memory">0</div>
      <div class="stat-label">Memory</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-members">0</div>
      <div class="stat-label">Members</div>
    </div>
  </div>
  <span class="refresh-time" id="last-update">—</span>
</div>

<!-- Main content -->
<div class="main">
  <!-- Profile info row -->
  <div class="profile-row" id="profile-row">
    <span class="profile-label">PROFILE:</span>
    <span class="profile-name" id="profile-name">—</span>
    <span class="fed-badge" id="fed-badge">⬡ Federation: —</span>
  </div>

  <!-- Agent office floor -->
  <div class="section-title">🏢 AGENT OFFICE FLOOR — MOP v2</div>
  <div class="agent-grid" id="agent-grid">
    <div class="no-agents">
      <div class="icon">⏳</div>
      <p>Memuatkan state MOP...</p>
    </div>
  </div>
</div>

<!-- Workflow bar -->
<div class="workflow-bar">
  <div class="workflow-label">WORKFLOW PHASES:</div>
  <div class="phases" id="phases-bar">
    <span class="phase pending">loading...</span>
  </div>
</div>

<script>
// ── Pixel Art Emoji Map (per agent role) ──────────────────────────────────────
const CHAR_EMOJI = {
  // Tier 1 — Strategy
  planner:      '🧑‍💼', researcher:   '🔬', orchestrator: '🎯',
  prompt:       '✍️',  seo:          '📈', ai:           '🤖',
  // Tier 2 — Design
  ux:           '🎨', accessibility: '♿', content:      '📝',
  mobile:       '📱',
  // Tier 3 — Architecture
  architect:    '🏗️', database:      '🗄️', 'data-ml':    '🤖',
  migration:    '🔄', infra:         '⚙️',
  // Tier 4 — Development
  coder:        '💻', frontend:      '🖥️', backend:      '⚙️',
  devops:       '🔧', deploy:        '🚀',
  // Tier 5 — Quality
  reviewer:     '🔍', tester:        '🧪', security:     '🔒',
  performance:  '⚡', sandbox:       '📦', qa:           '✅',
  // Tier 6 — Operations
  github:       '🐙', browser:       '🌐', memory:       '🧠',
  core:         '💎', 'workflow-ci': '🔁', pm:           '📋',
};

function renderAgent(agent) {
  const emoji = CHAR_EMOJI[agent.role] ?? '🤖';
  const dotClass = `dot-${agent.animation}`;
  const cardClass = agent.animation !== 'idle'
    ? `agent-card ${agent.animation}`
    : 'agent-card';
  const superpower = (agent.superpower || agent.role).slice(0, 60);

  return `
    <div class="${cardClass}" data-role="${agent.role}">
      <span class="tier-badge">T${agent.tier}</span>
      <div class="bubble">${superpower}</div>
      <div class="pixel-char">${emoji}</div>
      <div class="agent-name">${agent.role.toUpperCase()}</div>
      <div class="agent-title">${agent.title || ''}</div>
      <div class="status-row">
        <span class="status-dot ${dotClass}"></span>
        <span class="agent-activity">${agent.activity}</span>
      </div>
    </div>
  `;
}

function renderPhases(phases) {
  const order = phases.order ?? [];
  const current = phases.current ?? '';
  const completed = phases.completed ?? [];
  return order.map(p => {
    const isCurrent  = p === current;
    const isDone     = completed.includes(p);
    const cls = isCurrent ? 'phase current' : isDone ? 'phase completed' : 'phase pending';
    return `<span class="${cls}">${p}</span>`;
  }).join('');
}

async function fetchAndRender() {
  try {
    const res = await fetch('/api/state');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Header
    document.getElementById('current-phase').textContent = data.phase ?? '—';
    document.getElementById('stat-agents').textContent   = data.agentCount  ?? 0;
    document.getElementById('stat-memory').textContent   = data.memoryCount ?? 0;
    document.getElementById('stat-members').textContent  = data.memberCount ?? 0;
    document.getElementById('last-update').textContent   =
      '↻ ' + new Date(data.lastUpdate).toLocaleTimeString('ms-MY');

    // Profile row
    document.getElementById('profile-name').textContent = data.profile ?? '—';
    const fedBadge = document.getElementById('fed-badge');
    if (data.federation?.enabled) {
      fedBadge.textContent = `⬡ Federation: ${data.federation.syncCount} syncs`;
      fedBadge.className = 'fed-badge active';
    } else {
      fedBadge.textContent = '⬡ Federation: off';
      fedBadge.className = 'fed-badge';
    }

    // Agents — sort: active first, then by tier
    const agents = [...(data.agents ?? [])].sort((a, b) => {
      const aActive = a.animation !== 'idle' ? 0 : 1;
      const bActive = b.animation !== 'idle' ? 0 : 1;
      return aActive - bActive || (a.tier ?? 9) - (b.tier ?? 9);
    });

    const grid = document.getElementById('agent-grid');
    if (agents.length === 0) {
      grid.innerHTML = `
        <div class="no-agents" style="grid-column:1/-1">
          <div class="icon">🏢</div>
          <p>Tiada agent terdaftar dalam agentCatalog.<br>
          Mula kerja dan agent akan muncul di sini.</p>
        </div>
      `;
    } else {
      grid.innerHTML = agents.map(renderAgent).join('');
    }

    // Workflow phases bar
    document.getElementById('phases-bar').innerHTML = renderPhases(data.phases ?? {});

    // Page title
    document.title = `MOP — ${data.project} [${data.phase ?? '—'}]`;

  } catch (err) {
    document.getElementById('agent-grid').innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        ⚠ Ralat sambungan: ${err.message}<br>
        <small style="opacity:0.7">Pastikan server berjalan: node .MOP/scripts/mop-dashboard.mjs</small>
      </div>
    `;
  }
}

// ── Auto refresh every 5 seconds ─────────────────────────────────────────────
fetchAndRender();
setInterval(fetchAndRender, 5000);
</script>

</body>
</html>
